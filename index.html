<!DOCTYPE html>
<html>
<head>
<title>For You 💗</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: 'Comic Sans MS', cursive;
  background: linear-gradient(#ffe4ec, #fff);
}

h1 {
  margin-top: 30px;
  color: #d63384;
}

/* Cake */
#cake {
  width: 260px;
  margin-top: 40px;
  cursor: pointer;
  transition: 0.5s;
}

.hide {
  opacity: 0;
  transform: scale(0.5);
}

/* Countdown */
#countdown {
  font-size: 60px;
  color: #ff4d6d;
  margin-top: 20px;
}

/* Final section */
#final {
  display: none;
  margin-top: 40px;
}

/* Photo frames */
.frame {
  display: inline-block;
  padding: 20px;
  margin: 15px;
  border-radius: 25px;
  background: white;
  box-shadow: 0 0 30px pink;
  position: relative;
}

/* Flower borders */
.frame::before {
  content: "🌸🌼🌸🌼🌸🌼🌸🌼";
  position: absolute;
  top: -25px;
  left: 10px;
  font-size: 20px;
}
.frame::after {
  content: "🌸🌼🌸🌼🌸🌼🌸🌼";
  position: absolute;
  bottom: -25px;
  left: 10px;
  font-size: 20px;
}

/* Images */
.frame img {
  width: 220px;
  border-radius: 15px;
}

/* Message */
#line {
  font-size: 22px;
  margin-top: 25px;
  color: #d63384;
}

/* Confetti */
.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: pink;
  top: 0;
  animation: fall 3s linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh);
  }
}
</style>
</head>

<body>

<h1>Happy 1 Month 💗</h1>

<p>Tap the cake 🎂</p>

<img id="cake" src="cake.png" onclick="startCountdown()">

<div id="countdown"></div>

<div id="final">

  <div class="frame">
    <img src="photo1.jpg.jpeg">
  </div>

  <div class="frame">
    <img src="photo2.jpg.jpeg">
  </div>

  <div class="frame">
    <img src="photo3.jpg.jpeg">
  </div>

  <div id="line">
    can’t wait to recreate this in real life 💗
  </div>

</div>

<script>
function startCountdown() {
  let count = 3;
  let cd = document.getElementById("countdown");
  let cake = document.getElementById("cake");

  let interval = setInterval(() => {
    cd.innerHTML = count;
    count--;

    if (count < 0) {
      clearInterval(interval);
      cd.innerHTML = "💨";

      cake.classList.add("hide");

      setTimeout(() => {
        cake.style.display = "none";
        document.getElementById("final").style.display = "block";
        createConfetti();
      }, 800);
    }
  }, 1000);
}

function createConfetti() {
  for (let i = 0; i < 80; i++) {
    let conf = document.createElement("div");
    conf.className = "confetti";
    conf.style.left = Math.random() * 100 + "vw";
    conf.style.animationDuration = (Math.random() * 2 + 2) + "s";
    document.body.appendChild(conf);
  }
}
</script>

</body>
</html>
